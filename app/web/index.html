<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <!-- Meta tags SEO -->
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Neviim - Galeria de fotos da Paróquia São José do Operário.">

  <!-- Configurações PWA Responsividade e UI -->
  <!-- O Theme color dita a cor da barra do Android Chrome como Lilás #4A148C -->
  <meta name="theme-color" content="#4A148C">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <!-- Apple Safari Compatibilidade PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Neviim">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Neviim | Paróquia São José do Operário</title>
  <link rel="manifest" href="manifest.json">

</head>
<body style="background-color: #F3E5F5;">
  <!-- SplashScreen Placeholder Original (Background roxo leve pra loading instintivo) -->
  <script>
    {{flutter_js}}
    {{flutter_build_config}}

    window.addEventListener('load', function(ev) {
      const loaderConfig = {
        onEntrypointLoaded: function(engineInitializer) {
          engineInitializer.initializeEngine().then(function(appRunner) {
            appRunner.runApp();
          });
        }
      };

      if (window.isSecureContext && 'serviceWorker' in navigator) {
        loaderConfig.serviceWorkerSettings = {
          serviceWorkerVersion: '{{flutter_service_worker_version}}',
        };
      }

      // Service Worker/PWA exige HTTPS ou localhost. Em HTTP publico, iniciamos
      // o Flutter sem SW para manter o app navegavel ate ativarmos HTTPS.
      _flutter.loader.load(loaderConfig);
    });
  </script>
</body>
</html>
